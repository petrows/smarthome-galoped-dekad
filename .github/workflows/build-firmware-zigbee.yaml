name: Build Zigbee Firmware
on:
  workflow_call:
jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        chip:
            - esp32c6
    container:
      image: espressif/idf:release-v6.0
      options: -u 2025:2025
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.cache/ccache
          key: idf-zigbee-${{ matrix.chip }}
      - name: Build ${{ matrix.chip }}
        shell: bash
        working-directory: firmware-zigbee/galoped
        run: |
            source /opt/esp/idf/export.sh
            idf.py build
            idf.py merge-bin -o galoped-zigbee-firmware-${{ matrix.chip }}-biax-rgb.bin
            ccache -s
        env:
          IDF_TARGET: ${{ matrix.chip }}
          IDF_CCACHE_ENABLE: "1"
          CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
          TERM: xterm-256color
          CLICOLOR_FORCE: "1"
          FORCE_COLOR: "1"
          PY_COLORS: "1"
          CMAKE_COLOR_DIAGNOSTICS: "ON"
      - name: Archive firmware file
        uses: actions/upload-artifact@v7
        with:
          name: galoped-zigbee-firmware-${{ matrix.chip }}-biax-rgb.bin
          path: firmware-zigbee/galoped/galoped-zigbee-firmware-*.bin
