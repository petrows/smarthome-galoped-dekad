name: PlatformIO CI
on:
  push:
    paths:
      - '.github/workflows/pio-ci.yaml'
      - 'bin/build.sh'
      - 'firmware/**'
    branches:
      - master
  pull_request:
    paths:
      - '.github/workflows/pio-ci.yaml'
      - 'bin/build.sh'
      - 'firmware/**'
    branches:
      - master
jobs:
  user-manual:
    runs-on: self-hosted
    container:
      image: ghcr.io/petrows/latex:v1
      options: -u 2025:2025
    steps:
      - uses: actions/checkout@v4
      - name: Build manual
        run: |
            echo "::group::latex build"
            # See Dockerfile for static environment
            export CI=true
            cd manual
            xelatex manual.tex
            xelatex manual.tex
            xelatex manual.tex
            echo "::endgroup::"
      - name: Archive manual file
        uses: actions/upload-artifact@v4
        with:
          name: galoped-dekad-manual.pdf
          path: manual/manual.pdf

  build:
    runs-on: self-hosted
    container:
      image: ghcr.io/petrows/platformio:v4
      options: -u 2025:2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - name: Build firmware
        run: |
            echo "::group::pio ci"
            # See Dockerfile for static environment
            export CI=true
            # Build for each model (RGB and Retro)
            ./bin/build.sh rgb
            ./bin/build.sh retro
            # Build autoexec for each variant (Linear and Logf)
            ./bin/mk-autoexec.py -t autoexec.be --scale logf -o autoexec-logf.be
            ./bin/mk-autoexec.py -t autoexec.be --scale linear -o autoexec-linear.be
            echo "::endgroup::"
      - name: Archive firmware file
        uses: actions/upload-artifact@v4
        with:
          name: galoped-dekad
          path: |
            firmware/galoped-dekad-firmware-*.tar.gz
            autoexec-*.be
